  - language: "en"
    translator: ""
    body_html: |
      The prison in Kalmar sits high and visible, right between the Old Town and the new town on Kvarnholmen. In a central location. What does that mean for the city's self-image? For a month, the South Korean artist Won Jy has immersed himself in questions surrounding Kalmar, reflecting on what the word "warding" – to protect – means.<br><br>

      We think about where to meet. What place is natural for someone who works with reuse and temporary materials? In the end we agree to meet at Won Jy's guest studio in the old power-station building in Pukeberg, Nybro. He is eager to talk about and show the crushed glass he collects every morning.<br><br>

      The room is plain, with cracked wall plaster, Falu-red window frames, and a lot of clutter. In the middle of it all, a well-organized table with objects and sketches.<br><br>

      During his residency month in Kalmar, Won Jy examines how architecture can be welcoming or rejecting, and whether Kalmar is still shaped by its centuries-old history.<br><br>

      Against white plaster, he has shaped in blood-red clay the angular ravelins that surround Kvarnholmen, the castle, and the prison. The forms make an uncomfortable, almost too-obvious pattern. Their points are aimed at an imagined enemy. A construction that breathes thoughts of protection and threat.<br><br>

      "Won has done fantastic research," says Marie Johansson, chair of the Teatergalleriet association and a driving force behind the association's new outward-facing work.<br><br>

      "A couple of months ago I received a list of everything he wanted to know. He asked for historical maps, prison regulations, and documents about the prison's location on the Prins Carl ravelin."<br><br>

      On the studio table lie all the documents, and on the floor and window ledges the temporary working materials: stones of various sizes, buckets of crushed glass, color pigment, modeling clay, and silicone.<br><br>

      Won Jy finds materials everywhere.<br><br>

      "Every morning I go to the glass school and pick up broken glass," he says, showing a couple of blue buckets filled with crushed glass of different sizes.<br><br>

      On the table lie mirror-reversed texts – among them an intake form from the Kalmar prison.<br><br>

      "I've thought about what the Kalmar penal institution signals, sitting so centrally on the Prins Carl ravelin, midway between the old and the new town," he says. "'Warding' means surveillance, protection, and confinement all at once. Within that doubleness there is both shutting in and, at the same time, something to be protected. The question is who is to be protected and who is shut out."<br><br>

      A couple of weeks later we meet again, in Kalmar. The works are now in place at Teatergalleriet.<br><br>

      "This is a plaque mounted on the water tower in Kalmar. I made an impression in silicone and then cast the plate in glass. The water tower on the Gustavus Primus bastion dominates the city of Kalmar, just as the prison does," he says.<br><br>

      The nearly transparent text is hard to read, but the fingertips can just make out the words "Vårda Kalmar" ("Care for Kalmar") and a city coat of arms.<br><br>

      Won Jy is fascinated not only by Kalmar's ravelins but just as much by the landscape between Kalmar and Pukeberg.<br><br>

      "I've thought a lot about the stones scattered here and there across the landscape, which often form long walls," he says.<br><br>

      Now he has brought the stones into the exhibition and also shows a fictional landscape with thin stone fragments mounted in plaster. An image of the Småland landscape.<br><br>

      "Won Jy's residency and exhibition are part of Teatergalleriet's vision of reaching beyond the gallery walls," says Marie Johansson. "We have to leave the ordinary gallery room, meet new questions, and create encounters between the public and artists."<br><br>

      "The gallery should be a platform for activities and invite reality into the gallery," she continues. "Not just show exhibitions within the four walls. That is why we invite artists to examine our place and what art can mean today."<br><br>

      <em>Gunilla Petri</em>

