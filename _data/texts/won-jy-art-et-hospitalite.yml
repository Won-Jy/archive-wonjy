id: "won-jy-kalmar"

title_original:
  text_html: "Won Jy från Sydkorea har fördjupat sig i Kalmar"
  language: "sv"

author:
  name: "Gunilla Petri"
  bio_html: |
    Gunilla Petri is a Swedish art critic and journalist. She is the art writer for <i>Barometern-OT</i>, the regional daily of Kalmar County, where she has long reviewed exhibitions across Kalmar, Öland, and the surrounding region. She has also co-authored several books on Swedish artists, published by Barometerns förlag in Kalmar.

year: 2026
date_written: 2026-07-02

source_html: |
  Text by Gunilla Petri, published in <i>Barometern-OT</i>, Sweden, on 2 July 2026. Written on the occasion of Won Jy's solo exhibition <i>About Warding</i> at Teatergalleriet, Kalmar (2026), part of the Småland Triennial 2026.

original:
  language: "sv"
  body_html: |
    Fängelset i Kalmar ligger högt och synligt mittemellan Gamla stan och den nya staden på Kvarnholmen. På en central plats. Vad betyder det för stadens självbild? I en månad har den sydkoreanske konstnären Won Jy fördjupat sig i frågor kring Kalmar, och funderat över vad ordet "warding" – att skydda – innebär.<br><br>
    Vi funderar över var vi ska träffas. Vilken plats är naturlig för den som arbetar med återbruk och tillfälligt material. Till sist enas vi om att ses i Won Jys gästateljé i den gamla kraftverksbyggnaden i Pukeberg i Nybro. Han vill gärna berätta om och visa det glaskross han samlar varje morgon.<br>
    Rummet är enkelt med trasig väggputs, faluröda fönster och mycket bråte. Mitt i allt detta ett välorganiserat bord med objekt och skisser.<br>
    Under sin residensmånad i Kalmar undersöker Won Jy hur arkitektur kan vara välkomnande eller avvisande, och om Kalmar fortfarande påverkas av sin månghundraåriga historia.<br>
    Mot vitt gips har han i blodröd lera format de kantiga ravelinerna som omger Kvarnholmen, slottet och fängelset. Formerna bildar ett obehagligt och nästan övertydligt mönster. Med spetsarna riktade mot en tänkt fiende. En konstruktion som andas tankar kring skydd och hot.<br>
    – Won har gjort fantastisk research, berättar Marie Johansson, ordförande i föreningen Teatergalleriet och drivande i föreningens nya utåtriktade verksamhet.<br>
    – Jag fick en lista för ett par månader sedan på allt han ville veta. Han efterlyste historiska kartor, fängelseinstruktioner och dokument om fängelsets plats på ravelinen Prins Carl.<br>
    På bordet i ateljén finns alla dokument och på golv och fönsterkarmar de tillfälliga arbetsmaterialen. Stenar i olika storlek, hinkar med glaskross, färgpigment, plastlera och silikon.<br>
    Won Jy hittar material överallt.<br>
    – Varje morgon går jag till glasskolan och plockar åt mig krossat glas, berättar han och visar ett par blå hinkar med kross i olika storlek.<br>
    På bordet ligger spegelvända texter – bland annat ett inskrivningsformulär från fängelset i Kalmar.<br>
    – Jag har funderat över vad Kalmaranstalten som ligger så centralt på ravelinen Prins Carl, mittemellan den gamla och nya staden, signalerar, säger han. "Warding" betyder ju både övervakning, skydd och instängdhet. I dubbelheten finns både att stänga inne samtidigt som något ska skyddas. Frågan är vem som ska skyddas och vem som stängs ute.<br>
    Ett par veckor senare ses vi igen, i Kalmar. Föremålen finns nu på plats i Teatergalleriet.<br>
    – Det här är en plakett som sitter på vattentornet i Kalmar. Jag gjorde ett avtryck i silikon och nu har jag gjutit plattan i glas. Vattentornet på bastionen Gustavus Primus dominerar precis som fängelset staden Kalmar, säger han.<br>
    Den nästan genomskinliga texten är svårläst, men fingertopparna känner hjälpligt orden "Vårda Kalmar" och så ett stadsvapen.<br>
    Won Jy fascineras inte bara av Kalmars raveliner utan lika mycket av landskapet mellan Kalmar och Pukeberg.<br>
    – Jag har tänkt mycket på stenarna som ligger här och var i landskapet och som ofta bildar långa murar, säger han.<br><br>

    Nu har han lyft in stenarna i utställningen och visar också ett fiktivt landskap med tunna stenfragment monterade i gips. Bilden av det småländska landskapet.<br>
    – Won Jys residens och utställning ingår i Teatergalleriets vision att nå utanför galleriväggarna, säger Marie Johansson. Vi måste lämna det vanliga gallerirummet, möta nya frågeställningar och skapa möten mellan publik och konstnärer.<br>
    – Galleriet ska vara en plattform för aktiviteter och bjuda in verkligheten i galleriet, fortsätter hon. Inte bara visa utställningar inom de fyra väggarna. Därför bjuder vi in konstnärer att undersöka vår plats och vad konst kan betyda i dag.<br>

