translations:
  - language: "en"
    translator: ""
    body_html: |
      From the center of Nîmes—more precisely the Carré d’art, where I have just visited a beautiful exhibition<sup class="note-ref">[1]</sup>—I take the tram for a few stops to the CACN (Contemporary Art Center of Nîmes), which I do not yet know. I read online that it is a former social-medical center. Won Jy and I agreed to meet there, since he is working on-site on pieces for a solo exhibition opening a few weeks later<sup class="note-ref">[2]</sup>. Afterwards, he suggested we go to his studio, about a hundred meters away, in the Pissevin neighborhood, which I don’t know either.<br><br>

      After studying at the art school in his hometown of Daejeon, in Korea, and going through several experiences unrelated to art—yet decisive for the attention he gives to what surrounds him (for example, he worked as a street vendor in Seoul and lived on the streets in Paris)—Won Jy continued his artistic training at ESBAN. Deeply involved in local life, he is a founding member of GRAH! (Groupe de Recherche artistique et d’Action sur l’Hospitalité), a member of RESF 30 (Réseau Éducation Sans Frontières Gard), and a member of the Coordination Nîmoise des Jeunes Exilé·e·s en Danger. He was also part of Pamela<sup class="note-ref">[3]</sup>.<br><br>

      The tram ride is not long, but a whole world separates the city-center landscape from what I discover: large housing estates, some of which seem in ruins. Won Jy confirms that some have even already been blown up. The situation reminds me of a film by Dominique Cabrera in which residents of towers scheduled for demolition confide their sadness to her: even if the place was not ideal, it is their memories—their lives—that will be erased from the map<sup class="note-ref">[4]</sup>.<br><br>

      I find the art center easily. Inside, Won Jy is in the middle of construction. In one of the rooms, he is making a fountain from large pieces of concrete taken from demolitions in the neighborhood, which he recovered at the municipal landfill. Formally evoking the rocaille style of artificial grottoes in fashionable seventeenth-century gardens, his fountain—within this interior garden the white cube becomes—reflects the social reality of the neighborhood. A kind of tribute. By using the most devalued materials—the castoffs of an architecture itself perceived as a castoff, and whose inhabitants are not considered any better—he creates a noble object and gives back a sense of pride. Won Jy also often works with water: it washes and regenerates. Further on, he shows me his collection of dead pigeons, for which he makes sculptures shaped like small sarcophagi and an installation, like a memorial. The epoxy sculptures reproduce the form of living pigeons, at a 1:1 scale<sup class="note-ref">[5]</sup>, and contain the remains of dead pigeons, visible through transparency. Delicate like jewelry, they recall precious decorative objects in pâte de verre, or even rock crystal, a material reputed to be energizing. In Won Jy’s works, the generosity of the gesture replaces the richness of the base material. Here he transforms simple resin into highly refined pieces—almost solemn, and in any case very moving. They make you love pigeons. An installation of stacked plastic boxes, also containing pigeon remains and backlit by neon, produces the same effect on a more monumental scale. Repetition and the restraint of transparent white forms evoke a minimalist style, yet without emphasis or coldness—on the contrary, with tact and emotion. The ensemble is titled <i>Columbarium</i>, playing on the name of the buildings that house funerary urns in human cemeteries.<br><br>

      Other pieces are being made as well—less advanced, still at the studio. We leave the art center to go see them.<br><br>

      On the way, Won Jy comments on the neighborhood we cross, one of the major sites of drug trafficking in France. The media library has closed. A police station was set on fire as soon as it moved in. A young man was murdered behind his studio. This is why our walk is not, strictly speaking, a “stroll.”<br><br>

      The environment is very harsh, but given his involvement in several mutual-aid associations—associations he manages to connect to his work—Won Jy feels it is necessary to be here, at the heart of the real, and his attentiveness means he is accepted by everyone. When we arrive at his studio, formerly a Muslim funeral home, he evokes an exhibition, <i>Hostis</i>, that he organized there the previous year: he created an indoor garden by growing wild plants collected nearby, and he took in injured pigeons, amid neighborhood rubble used like decorative rocks. Traces of that installation remain—plants, bags of soil, fragments of concrete. As a complement to the exhibition, he produced a publication listing the surprising plant and animal species that had appeared in his garden, titled <i>Liste des espèces résidentes</i>. I find it magnificent to consider all living beings as “residents,” a term usually reserved for humans. The phrase brings to mind the chapter “becoming-termite” in a book by Bruno Latour, in which the philosopher proposes rereading Kafka’s <i>Metamorphosis</i> in order to reconsider the insect Gregor Samsa becomes as a model for life under the current ecological and social crisis. “This becoming-insect […] would make it possible to calm the dread of someone who has nothing left, for reassurance, but the moon to contemplate—because it is the only nearby being that is external to one’s worries,” Latour wrote<sup class="note-ref">[6]</sup>. Won Jy’s “resident species” echo his desire to live together in a tolerant and peaceful way: humans, feral pigeons, petit-gris snails, common woodlice, elm-leaved brambles, sacred bamboo, curly dock…<sup class="note-ref">[7]</sup>. Finally, on the ground, I see an elegant slab reminiscent of outdoor furniture in Italian villas. Won Jy explains that it is a “granito,” an aggregate of mineral granules, which he is finishing to serve as seating in the exhibition (facing a video) but which could very well become a public bench (<i>Banc en granito</i>, 2024). He makes it from ordinary stones and sand gathered precisely in Bellegarde, a village near Nîmes. Indicating this origin ennobles the materials, as if they had an AOC. Moreover, they are sanded and cleaned with a water jet layer by layer so they are as smooth as possible to the touch—opposite to the sharp stones that have appeared on benches in cities in recent years to prevent unhoused people from lying down. “A second bench, identical in form but of different dimensions, will be made to support stones placed on it and exhibited with the ensemble. Thus, while one sits on the first, the second will present—at the same height—stones arranged so as to suggest an equality, even a possible identification, between people and stones,” he foresees. Faithful to the philosophy guiding his approach, these two works will be oriented toward antispeciesism and the practice of hospitality.<br><br>

      To continue our conversation, Won Jy offers to drive me back to Nîmes station. Among the things he says while driving, I remember that he feels fully part of the Nîmes art scene. I would add, as a very worthy heir of Hubert Duprat—who taught him and for whom he worked as an assistant<sup class="note-ref">[8]</sup>—that he also embodies values we deeply need today.
