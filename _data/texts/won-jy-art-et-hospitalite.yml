id: "won-jy-art-hospitalite"

title_original:
  text_html: "Won Jy, l'art et l'hospitalité"
  language: "fr"

author:
  name: "Vanessa Morisset"
  bio_html: |
    <p>
    Vanessa Morisset is an art historian and art critic. Her interests span a wide range of topics, following a program inspired by Gilles Deleuze’s idea of “exiting philosophy through philosophy,” transposed into art. She works on the relationships between art and other fields such as cinema, literature, and the social sciences. A reflection intertwined with a passionate love of writing also leads her toward more experimental forms of textual production, guided by Michel Leiris’s idea: “it is through subjectivity (brought to its extreme) that one reaches objectivity.”
    </p>
    <p>
    <span style="color:#666">Source: Palais de Tokyo website, 2026.</span>
    </p>

year: 2026
