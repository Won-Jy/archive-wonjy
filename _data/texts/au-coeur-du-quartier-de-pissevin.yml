original:
  language: "fr"
  body_html: |
    Depuis le centre-ville de Nîmes, plus exactement le Carré d'art où je viens de visiter une belle exposition<sup class="note-ref">[1]</sup>, je prends un tram pour aller à quelques arrêts, au CACN (Centre d'Art Contemporain de Nîmes) que je ne connais pas encore. Je lis sur internet que c'est un ancien centre médico-social. Avec Won Jy, nous avons convenu de nous y retrouver là, car il travaille sur place à des pièces pour une exposition solo qui ouvrira quelques semaines plus tard<sup class="note-ref">[2]</sup>. Ensuite, il m'a proposé d'aller à son atelier, à une centaine de mètres, dans le quartier de Pissevin, que je ne connais pas encore non plus.<br><br>

    Après avoir étudié à l'école d'art de sa ville natale, Daejeon, en Corée, et vécu plusieurs expériences qui n'ont rien à voir avec l'art, mais vont être déterminantes quant à l'attention qu'il porte aux choses autour de lui – par exemple, il a été marchand ambulant à Séoul, a vécu dans la rue à Paris – Won Jy a poursuivi sa formation d'artiste à l'ESBAN. Très impliqué dans la vie locale, il est membre fondateur du GRAH ! (Groupe de Recherche artistique et d'Action sur l'Hospitalité), membre du RESF 30 (Réseau Éducation Sans Frontières Gard), membre de la Coordination Nîmoise des Jeunes Exilé.e.s en Danger. Il a également fait partie de Pamela<sup class="note-ref">[3]</sup>.<br><br>

    Le trajet en tram n'est pas long, mais un monde sépare le paysage urbain du centre-ville de celui que je découvre, avec de grands ensembles, dont certains semblent en ruine. Won Jy confirmera : certains ont même déjà été dynamités. Cette situation me rappelle un film de Dominique Cabrera dans lequel les habitant·es de tours qui vont être détruites lui confient leur tristesse : même si le lieu n'était pas idéal, c'est leurs souvenirs, leur vie, qu'on va rayer de la carte<sup class="note-ref">[4]</sup>.<br><br>

    Je trouve le centre d'art facilement. À l'intérieur, Won Jy est en plein chantier. Dans l'une des salles, il fabrique une fontaine à partir de gros morceaux de béton justement issus des démolitions du quartier qu'il a récupérés à la décharge municipale. Évoquant formellement le style rocaille des fausses grottes dans les jardins chics du XVIIe siècle, sa fontaine à lui, dans ce jardin intérieur que devient le white cube, est un reflet de la réalité sociale du quartier. Un hommage en quelque sorte. En utilisant des matériaux les plus dépréciés, rebuts d'une architecture elle-même perçue comme rebut, dont les habitant·es ne sont pas mieux considérés, pour créer un objet noble, il leur redonne de la fierté. Won Jy travaille aussi souvent avec l'eau : elle lave et régénère. Plus loin, il me montre sa collection de pigeons morts pour lesquels il façonne des sculptures en forme de petits sarcophages et une installation, comme un mémorial. Les sculptures, en époxy, reproduisent la forme de pigeons vivants, à l'échelle 1<sup class="note-ref">[5]</sup>, et contiennent les restes de pigeons morts que l'on perçoit en transparence. Délicates comme des bijoux, elles font penser à des objets de décoration précieux, en pâte de verre, voire en cristal de roche, matériau réputé pour être énergisant. Dans les œuvres de Won Jy, la générosité du geste se substitue à la richesse du matériau de base. Ici, il transfigure la simple résine, aboutissant à des pièces très raffinées, presque solennelles, en tout cas très touchantes. Elles font aimer les pigeons. Une installation de boites en plastique empilées contenant elles aussi des restes de pigeons, rétroéclairées par un néon, produit le même effet, en plus monumental. La répétition, la sobriété des formes blanches transparentes, renvoient au style minimaliste, mais sans emphase ni froideur, avec, au contraire, tact et émotion. Le titre de l'ensemble est Columbarium, jouant avec le nom des bâtiments qui abritent les urnes funéraires dans les cimetières humains.<br><br>

    D'autres pièces sont en cours de réalisation, moins avancées, encore à l'atelier. Nous quittons le centre d'art pour aller les voir.<br><br>

    Sur le chemin, Won Jy commente le quartier que nous traversons, un des plus hauts lieux du trafic de drogue en France. La médiathèque a fermé. Un commissariat a été incendié dès son emménagement. Un jeune homme a été assassiné derrière son atelier. C'est pourquoi notre marche n'est pas une « promenade » à proprement parler.<br><br>

    L'environnement est très dur, mais étant donné son engagement dans plusieurs associations d'entraide qu'il parvient à lier à son travail, Won Jy trouve une nécessité à être ici, au cœur du réel, et sa sollicitude fait qu'il est accepté par tout le monde. En arrivant à son atelier qui auparavant était un local de pompes funèbres musulmanes, il évoque une exposition, Hostis, qu'il y avait organisée l'année précédente : il avait créé un jardin intérieur en faisant pousser des plantes sauvages récupérées aux alentours et il accueillait des pigeons blessés, au milieu de gravats du quartier en guise de rochers décoratifs. De cette installation, il reste des traces, des plantes, des sacs de terre et de fragments de béton. En complément de l'exposition, il avait réalisé une édition répertoriant les espèces étonnantes de plantes et d'animaux qui s'étaient invitées dans son jardin, intitulée Liste des espèces résidentes. Je trouve magnifique de considérer tout le vivant comme des « résident·es », terme généralement réservé aux humains. Cette expression me rappelle le chapitre « devenir-termite » d'un livre de Bruno Latour, dans lequel le philosophe propose de relire La Métamorphose de Kafka pour reconsidérer la blatte qu'est devenu Grégoire Samsa comme un modèle de vie, dans les conditions actuelles de crise écologique et sociale. « Ce devenir insecte […] permettrait de calmer l'effroi de celui qui n'a plus, pour se rassurer, que la lune à contempler parce qu'elle est le seul être proche qui soit extérieur à ses soucis », écrivait Latour<sup class="note-ref">[6]</sup>. Les « espèces résidentes » de Won Jy lui font écho par son désir de vivre ensemble de manière tolérante et apaisée, humains, pigeons bisets, escargots petits-gris, cloportes communs, ronces à feuilles d'orme, bambou sacré, oseille crépu…<sup class="note-ref">[7]</sup>. Enfin, au sol, je vois une plaque élégante qui rappelle le mobilier extérieur des villas italiennes. Won Jy m'explique qu'il s'agit d'un « granito », agglomérat de granulats minéraux, qu'il est en train de terminer, pour offrir une assise dans l'exposition (face à une vidéo) mais pourrait très bien devenir un banc public (Banc en granito, 2024). Won Jy le fabrique à partir de cailloux et de sable ordinaires glanés précisément à Bellegarde, un village près de Nîmes. Grâce à l'indication de cette origine, les matériaux sont anoblis, comme s'ils avaient un AOC. De plus, ils sont poncés et nettoyés au jet d'eau couche par couche, pour qu'ils soient le plus lisse possible au toucher, à l'opposé des pierres aiguës qu'on a vues apparaître sur les assises, dans les villes, ces dernières années, pour empêcher les sans-abris de s'y reposer. « Un second banc, identique dans sa forme mais de dimensions différentes sera réalisé pour servir de support à des pierres déposées dessus et exposées avec l'ensemble. Ainsi, tandis que l'on s'assoira sur le premier, le second présentera, à la même hauteur, des pierres disposées de façon à suggérer une mise à égalité, voire une possible identification, entre les personnes et les pierres », prévoit-il. Fidèles à la philosophie qui guide sa démarche, ces deux œuvres seront tournées vers l'antispécisme et la pratique de l'hospitalité.<br><br>

    Pour poursuivre nos échanges, Won Jy me propose de me raccompagner à la gare de Nîmes en voiture. Parmi les choses qu'il me dit en conduisant, je retiens qu'il se sent pleinement faire partie de la scène nîmoise, j'ajouterai, en très digne héritier d'Hubert Duprat, qu'il a eu comme enseignant et dont il a été l'assistant<sup class="note-ref">[8]</sup>, avec en plus l'incarnation de valeurs dont nous avons profondément besoin aujourd'hui.
