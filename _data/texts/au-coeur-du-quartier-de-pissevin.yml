id: "au-coeur-du-quartier-de-pissevin"

title_original:
  text_html: "Au cœur du quartier de Pissevin<br>Won Jy, l'art et l'hospitalité"
  language: "fr"

author:
  name: "Vanessa Morisset"
  bio_html: |
    Vanessa Morisset is a French art historian and art critic based in Reims, where she teaches art history and current artistic affairs at the Esad de Reims. Her research follows Gilles Deleuze's idea of "getting out of philosophy through philosophy," transposed to art, and focuses on the relations between art and other fields such as cinema, literature, and the social sciences. Her doctoral thesis examined Mimmo Rotella's décollages of cinema posters — westerns, sword-and-sandal films, fantasy and horror movies — in Rome around 1960. A regular contributor to the magazine 02, she is also drawn to more experimental forms of writing, guided by Michel Leiris's idea that "it is through subjectivity, pushed to its paroxysm, that one touches objectivity."

