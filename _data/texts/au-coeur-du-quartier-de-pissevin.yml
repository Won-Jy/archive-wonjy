translations:
  - language: "en"
    translator: ""
    body_html: |
      From downtown Nîmes—more precisely the Carré d'art, where I have just seen a fine exhibition<sup class="note-ref">[1]</sup>—I take a tram a few stops to the CACN (Centre d'Art Contemporain de Nîmes), which I don't know yet. I read online that it's a former medico-social center. Won Jy and I have agreed to meet there, since he is working on site on pieces for a solo exhibition that will open a few weeks later<sup class="note-ref">[2]</sup>. Afterwards, he suggests we go to his studio, about a hundred meters away, in the Pissevin neighborhood, which I don't know either.<br><br>

      After studying at the art school in his hometown of Daejeon, South Korea, and going through several experiences that had nothing to do with art but would prove decisive for the attention he pays to the things around him—for instance, he worked as a street vendor in Seoul and lived on the streets of Paris—Won Jy went on to train as an artist at ESBAN (the Nîmes School of Fine Arts). Deeply involved in local life, he is a founding member of GRAH! (an artistic research and action group on hospitality), a member of RESF 30 (Réseau Éducation Sans Frontières Gard), and a member of the Coordination Nîmoise des Jeunes Exilé.e.s en Danger. He was also part of Pamela<sup class="note-ref">[3]</sup>.<br><br>

      The tram ride is short, but a whole world separates the urban landscape of downtown from the one I now discover, with large housing estates, some of which appear to be in ruins. Won Jy will confirm that some have already been demolished with explosives. This situation reminds me of a film by Dominique Cabrera, in which residents of towers about to be destroyed confide their sadness to her: even if the place wasn't ideal, it is their memories, their lives, that are being wiped off the map<sup class="note-ref">[4]</sup>.<br><br>

      I find the art center easily. Inside, Won Jy is in the middle of building things. In one of the rooms, he is making a fountain out of large chunks of concrete—salvaged, precisely, from demolitions in the neighborhood, which he collected at the municipal dump. Formally evoking the rocaille style of the fake grottoes found in the fashionable gardens of the seventeenth century, his own fountain, in this interior garden that the white cube is becoming, reflects the social reality of the neighborhood. A tribute, in a way. By using the most devalued materials—the debris of an architecture itself regarded as debris, whose residents are held in no higher regard—to create a noble object, he restores their dignity. Won Jy also often works with water: it washes and regenerates. Further along, he shows me his collection of dead pigeons, for which he shapes sculptures in the form of small sarcophagi, as well as an installation, like a memorial. The sculptures, made of epoxy, reproduce the shape of living pigeons at life scale<sup class="note-ref">[5]</sup>, and contain the remains of dead pigeons, visible through the transparent material. Delicate as jewelry, they bring to mind precious decorative objects—glass paste, or even rock crystal, a material said to be energizing. In Won Jy's work, the generosity of the gesture stands in for the richness of the base material. Here, he transfigures ordinary resin into pieces that are highly refined, almost solemn, and in any case deeply moving. They make you love pigeons. An installation of stacked plastic boxes, also containing pigeon remains and backlit by neon, produces the same effect on a more monumental scale. The repetition and the sobriety of the white, transparent forms recall a minimalist style, but without emphasis or coldness—on the contrary, with tact and emotion. The title of the ensemble is Columbarium, playing on the name of the buildings that house funerary urns in human cemeteries.<br><br>

      Other pieces are in progress, less advanced, still at the studio. We leave the art center to go see them.<br><br>

      Along the way, Won Jy comments on the neighborhood we're passing through, one of the biggest drug-trafficking hotspots in France. The media library has closed. A police station was set on fire as soon as it moved in. A young man was murdered behind his studio. Which is why our walk isn't really a "stroll" in the strict sense.<br><br>

      The environment is very harsh, but given his involvement in several mutual-aid associations that he manages to connect to his work, Won Jy finds it necessary to be here, at the heart of things as they really are, and his attentiveness means he is accepted by everyone. Arriving at his studio, which used to be a Muslim funeral home, he brings up an exhibition, Hostis, that he organized there the previous year: he had created an indoor garden by growing wild plants gathered from the surrounding area, and he took in injured pigeons, amid rubble from the neighborhood used as decorative rocks. Traces of this installation remain—plants, bags of soil, and fragments of concrete. To accompany the exhibition, he had produced a publication listing the surprising plant and animal species that had taken up residence in his garden, titled List of Resident Species. I find it wonderful to think of all living things as "residents," a term usually reserved for humans. This expression brings to mind the "becoming-termite" chapter of a book by Bruno Latour, in which the philosopher suggests rereading Kafka's Metamorphosis to reconsider the cockroach that Gregor Samsa becomes as a model for living, given today's ecological and social crisis. "This becoming-insect [...] would make it possible to calm the dread of someone who, to reassure himself, has nothing left to contemplate but the moon, because it is the only nearby being that remains outside his troubles," Latour wrote<sup class="note-ref">[6]</sup>. Won Jy's "resident species" echo this idea through his desire to live together, tolerantly and peacefully—humans, feral pigeons, garden snails, common woodlice, elm-leaf brambles, sacred bamboo, curly dock…<sup class="note-ref">[7]</sup>. Finally, on the ground, I see an elegant slab reminiscent of the outdoor furnishings of Italian villas. Won Jy explains that it's a "granito," an aggregate of mineral granules, which he is finishing to serve as a seat in the exhibition (facing a video) but which could easily become a public bench (Banc en granito, 2024). Won Jy makes it from ordinary pebbles and sand gathered specifically at Bellegarde, a village near Nîmes. Thanks to this stated origin, the materials are ennobled, as if they carried an official designation of origin. They are also sanded and cleaned with a water jet, layer by layer, to make them as smooth as possible to the touch—the opposite of the sharp stones that have appeared on public seating in cities in recent years, meant to keep the homeless from resting there. "A second bench, identical in shape but of different dimensions, will be made to hold stones placed and displayed alongside it. So while one sits on the first, the second will present, at the same height, stones arranged to suggest an equivalence—even a possible identification—between people and stones," he explains. True to the philosophy guiding his approach, both works will be oriented toward anti-speciesism and the practice of hospitality.<br><br>

      To continue our conversation, Won Jy offers to drive me back to the Nîmes train station. Among the things he tells me while driving, I take note that he feels he is fully part of the Nîmes art scene—I would add, as a very worthy heir to Hubert Duprat, who was his teacher and whose assistant he was<sup class="note-ref">[8]</sup>, while also embodying values that we deeply need today.
